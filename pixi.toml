[workspace]
name = "pdftotext"
version = "0.1.0"
authors = ["Marius S <marius@seritan.net>"]
description = "A from-scratch PDF-to-text extractor in Mojo. Depends on zlib.mojo for FlateDecode."
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b3.dev2026061206"
# zlib for the FlateDecode shim (built from the sibling zlib.mojo checkout).
zlib = ">=1.3.1,<2"

[tasks]
# Build the zlib shim (from the sibling ../zlib.mojo) into THIS env's lib so the
# dlopen at runtime resolves it. Mirrors how headgate builds flare's shims.
ffi = "bash ../zlib.mojo/src/ffi/build.sh"
build = { cmd = "mkdir -p build && mojo build src/main.mojo -I src -I ../zlib.mojo/src -o build/pdftotext", depends-on = ["ffi"] }
test  = { cmd = "mkdir -p build && mojo build src/pdf_test.mojo -I src -I ../zlib.mojo/src -o build/pdf-test && ./build/pdf-test", depends-on = ["ffi"] }
# Extract text from a PDF: pixi run extract -- path/to/file.pdf
extract = { cmd = "./build/pdftotext", depends-on = ["build"] }
